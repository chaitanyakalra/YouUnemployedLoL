services:
  # ── MCP Server (always-on web service) ───────────────────────────────────────
  - type: web
    name: job-mcp-server
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: MONGODB_URI
        sync: false   # paste this in Render dashboard
      - key: NODE_ENV
        value: production
